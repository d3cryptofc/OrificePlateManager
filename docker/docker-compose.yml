version: "3"

services:
  database:
    image: postgres
    restart: always
    env_file:
      - ../environment/database.env
    healthcheck:
      test: /usr/bin/pg_isready
      interval: 5s
      timeout: 10s
      retries: 120
    volumes:
      - ./entrypoint/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgresql-data:/var/lib/postgresql
  
  web:
    build:
      context: ..
      dockerfile: docker/dockerfiles/WEB
    restart: always
    ports:
      - 80:80
    depends_on:
      database:
        condition: service_healthy
    